<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>页面未找到 | Page Not Found</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #5e6b7a;
      --line: #dbe3ee;
      --accent: #0f766e;
      --focus: #f59e0b;
      --shadow: 0 18px 42px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0;
    }

    .lang-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .lang-switch button {
      min-width: 76px;
      border: 0;
      border-radius: 6px;
      padding: 8px 12px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .lang-switch button[aria-pressed="true"] {
      background: var(--accent);
      color: #ffffff;
    }

    .panel {
      margin-top: 28px;
      padding: clamp(24px, 5vw, 48px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 44px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 17px;
    }

    a {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <main>
    <div class="lang-switch" role="group" aria-label="Language switch">
      <button type="button" data-lang-button="zh" aria-pressed="true">中文</button>
      <button type="button" data-lang-button="en" aria-pressed="false">English</button>
    </div>

    <section class="panel lang-block" data-lang="zh" lang="zh-CN">
      <h1>页面未找到</h1>
      <p>你访问的页面不存在，可能是链接拼写有误或页面已经移动。你可以返回协议中心继续查看隐私政策和用户协议。</p>
      <a href="./index.html?lang=zh" data-lang-link>返回协议中心</a>
    </section>

    <section class="panel lang-block" data-lang="en" lang="en" hidden>
      <h1>Page Not Found</h1>
      <p>The page you requested does not exist. The link may be misspelled or the page may have moved. You can return to the Legal Center to view the Privacy Policy and User Agreement.</p>
      <a href="./index.html?lang=en" data-lang-link>Back to Legal Center</a>
    </section>
  </main>

  <script src="./assets/legal.js" defer></script>
</body>
</html>
